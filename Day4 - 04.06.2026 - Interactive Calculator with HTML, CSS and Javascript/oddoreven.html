<html>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg, #4B2E2B, #6F4E37);
    font-family:Arial, sans-serif;
}

.container{
    background:#FFF8F0;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    text-align:center;
    width:300px;
}

h2{
    color:#4B2E2B;
    margin-bottom:20px;
}

input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border:2px solid #C4A484;
    border-radius:8px;
    font-size:16px;
    outline:none;
}

input:focus{
    border-color:#6F4E37;
}

button{
    margin-top:15px;
    padding:10px 25px;
    border:none;
    border-radius:8px;
    background:#6F4E37;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#4B2E2B;
    transform:scale(1.05);
}

#result{
    margin-top:15px;
    font-weight:bold;
    color:#4B2E2B;
}
</style>
<body>
<div class="container">
<h2>Odd or Even</h2>
<input type="number" placeholder="Number 1" id="num1">
<br>
<input type="number" placeholder="Number 2" id="num2">

<button onclick="findans()">Find!</button>
<p id="result"></p>
</div>
</body>
<script>
function findans(){
let n1 = document.getElementById("num1").value;
let n2 = document.getElementById("num2").value;
let sum = Number(n1)+Number(n2);
let ans = sum;
let dig = 0;
while(ans>0){
dig = dig + ans%10;
ans = parseInt(ans/10);
}
let iseven = "odd";
if(dig%2==0) iseven = "even";
document.getElementById("result").textContent = "Sum of digits = " + dig + ", which is " + iseven;
}
</script>
</html>

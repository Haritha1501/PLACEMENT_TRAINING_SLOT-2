<html>
<style>
#inp{
padding:20px;
margin:5px;
background-color:#d3d3d3;
width: fit-content;
border-radius:10px;
}
input{
margin:2px;
border-radius:5px;
}
#operate{
padding:20px;
margin:5px;
background-color:aqua;
width: fit-content;
border-radius:10px;
}
</style>
<body>
<div id="inp">
<input type="number" placeholder="First number:" id="num1">
<br>
<input type="number" placeholder="Second number:" id="num2">
</div>

<div id="operate">
<button class="op"vonclick="add()">Add</button>
<button onclick="sub()">Subtract</button>
<br>
<button onclick="mul()">Multiply</button>
<button onclick="divide()">Divide</button>
</div>

<p id="result"></p>

</body>
<script>

function add(){
let n1 = document.getElementById("num1").value;
let n2 = document.getElementById("num2").value;
let sum = Number(n1)+Number(n2);
document.getElementById("result").textContent = "Result is:"+sum;
}

function sub(){
let n1 = document.getElementById("num1").value;
let n2 = document.getElementById("num2").value;
let diff = Number(n1)-Number(n2);
if(Number(n1)<Number(n2)){
diff = Number(n2)-Number(n1);
}
document.getElementById("result").textContent = "Result is:"+diff;
}

function mul(){
let n1 = document.getElementById("num1").value;
let n2 = document.getElementById("num2").value;
let prod = Number(n1)*Number(n2);
document.getElementById("result").textContent = "Result is:"+prod;
}

function divide(){
let n1 = document.getElementById("num1").value;
let n2 = document.getElementById("num2").value;
let quot = Number(n1)/Number(n2);
document.getElementById("result").textContent = "Result is:"+quot;
}
</script>
</html>
